<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ivess Reggieri - Alta automática</title>
  <link rel="icon" type="image/x-icon" href="./assets/favicon-somoselagua.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .alta-form {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .alta-form label {
      color: #d8efff;
      font-weight: 700;
      font-family: "Montserrat", "Manrope", sans-serif;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .phone-row {
      display: grid;
      grid-template-columns: minmax(140px, 42%) minmax(0, 1fr);
      gap: 10px;
    }

    .phone-row .input {
      min-width: 0;
    }

    .alta-note {
      color: #bfe4ff;
      font-size: 12px;
      margin: 2px 0 6px;
      font-weight: 600;
    }

    .alta-content {
      max-width: 760px;
      margin: 0 auto;
    }

    @media (max-width: 520px) {
      .phone-row {
        grid-template-columns: minmax(132px, 44%) minmax(0, 1fr);
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <main class="app">
      <header class="header">
        <img class="logo" src="https://ivessreggieri.com.ar/wp-content/uploads/2021/08/LOGO-FINAL.png" alt="Ivess Reggieri" />
      </header>

      <section class="content alta-content">
        <h1 class="title">ALTA AUTOMÁTICA</h1>
        <div class="title-divider"></div>
        <p class="subtitle">Completanos tus datos y te contactamos para activar tu cuenta.</p>

        <form class="alta-form" id="alta-form">
          <label for="alta-direccion">Dirección</label>
          <input id="alta-direccion" class="input" type="text" autocomplete="street-address" placeholder="Ej: Av. Corrientes 1234" />

          <label for="alta-localidad">Localidad</label>
          <input id="alta-localidad" class="input" type="text" autocomplete="address-level2" placeholder="Ej: Ramos Mejía" list="alta-localidades-list" />
          <datalist id="alta-localidades-list"></datalist>

          <label>Teléfono celular</label>
          <div class="phone-row">
            <input id="alta-cod-area" class="input" type="tel" inputmode="numeric" autocomplete="tel-area-code" placeholder="Cod. de área" />
            <input id="alta-celular" class="input" type="tel" inputmode="numeric" autocomplete="tel-national" placeholder="Número celular" />
          </div>
          <p class="alta-note">Ingresalo sin 0 ni 15. Ej: 11 + 45551234.</p>

          <div class="actions">
            <button id="alta-submit" type="submit" style="width:100%">Enviar solicitud</button>
          </div>
          <p id="alta-feedback" class="alta-note" style="margin-top:0"></p>
        </form>

        <a class="advisor-link" href="https://wa.me/5491133053315?text=Hola%20Ivess%20Reggieri%2C%20quiero%20darme%20de%20alta%20como%20cliente..." target="_blank" rel="noopener noreferrer"><img src="./assets/whatsapp.svg" alt="" class="advisor-link-icon" /> Hablar con un asesor</a>
        <div class="actions">
          <a href="./index.html" class="advisor-link" style="margin-top:0;background:transparent;border:2px solid #9ad1ff">Volver al inicio</a>
        </div>
      </section>

      <footer class="dev-credit">DESARROLLO DE <strong><a href="https://ideamos.com.ar" target="_blank" rel="noopener noreferrer">ESTUDIO IDEAMOS</a></strong> © 2026</footer>
    </main>
  </div>
  <script type="module" src="./src/altas.js?v=20260526-1"></script>
</body>
</html>
